<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基于微信生态的问答智能体</title>
  <style>
    :root {
      --bg1: #eff6ff;
      --bg2: #f5f3ff;
      --text: #111827;
      --muted: #6b7280;
      --border: rgba(229, 231, 235, 0.85);
      --shadow: 0 18px 42px rgba(17, 24, 39, 0.10);
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --accent: #7c3aed;
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: -30%;
      pointer-events: none;
      background:
        radial-gradient(820px 520px at 20% 15%, rgba(37, 99, 235, 0.16), transparent 60%),
        radial-gradient(820px 520px at 82% 20%, rgba(124, 58, 237, 0.14), transparent 60%),
        radial-gradient(740px 520px at 60% 88%, rgba(29, 78, 216, 0.10), transparent 60%);
      filter: blur(18px);
      transform: translateZ(0);
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      position: relative;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.78);
      border: none;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 34px 26px 28px;
      display: grid;
      gap: 34px;
    }

    header { display: grid; gap: 14px; text-align: center; }
    h1 {
      margin: 0;
      font-size: 35px;
      font-weight: 800;
      letter-spacing: 0.2px;
      line-height: 1.15;
    }
    .subtitle {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    .tile {
      text-decoration: none;
      color: inherit;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.70);
      border: 1px solid rgba(229, 231, 235, 0.75);
      padding: 16px 14px;
      display: grid;
      gap: 10px;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      box-shadow: 0 10px 22px rgba(17, 24, 39, 0.06);
    }
    .tile:active { transform: translateY(1px); }
    .tile:hover {
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow: 0 16px 30px rgba(17, 24, 39, 0.10);
    }

    .tile-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .tile-title h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .tag {
      font-size: 12px;
      color: rgba(17, 24, 39, 0.72);
      background: rgba(17, 24, 39, 0.06);
      border: 1px solid rgba(17, 24, 39, 0.08);
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .btn {
      margin-top: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      width: fit-content;
    }
    .btn.alt { background: linear-gradient(135deg, var(--accent), rgba(124, 58, 237, 0.78)); }

  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="stage">
    <div class="card">
      <header>
        <h1>基于微信生态的问答智能体</h1>
        <p class="subtitle">选择下方功能进入对应页面：成绩查询或智能问答。</p>
      </header>

      <div class="grid">
        <a class="tile" href="/static/score.html">
          <div class="tile-title">
            <h2>成绩查询</h2>
            <span class="tag">Score</span>
          </div>
          <p class="desc">输入姓名与学号，查询个人课程成绩。</p>
          <span class="btn">进入</span>
        </a>

        <a class="tile" href="/static/chat.html">
          <div class="tile-title">
            <h2>问答系统</h2>
            <span class="tag">QA</span>
          </div>
          <p class="desc">输入问题并回车发送，获取智能回答。</p>
          <span class="btn alt">进入</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
