<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基于微信生态的问答智能体</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: rgba(229, 231, 235, 0.9);
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.08);
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 247, 251, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      text-decoration: none;
      color: rgba(17, 24, 39, 0.8);
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
    }

    .nav a:hover {
      background: rgba(37, 99, 235, 0.08);
      border-color: rgba(37, 99, 235, 0.18);
      color: rgba(17, 24, 39, 0.92);
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      position: relative;
    }

    .card {
      width: 100%;
      max-width: 920px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 20px;
      display: grid;
      gap: 18px;
    }

    header { display: grid; gap: 10px; text-align: left; }
    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.2px;
      line-height: 1.15;
    }
    .subtitle {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    .tile {
      text-decoration: none;
      color: inherit;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
      padding: 16px 14px;
      display: grid;
      gap: 10px;
      transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    }
    .tile:active { transform: translateY(1px); }
    .tile:hover {
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow: 0 14px 28px rgba(17, 24, 39, 0.10);
    }

    .tile-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .tile-title h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .tag { display: none; }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .btn {
      margin-top: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      width: fit-content;
    }
    .btn.alt { background: linear-gradient(135deg, #111827, rgba(17, 24, 39, 0.86)); }

  </style>
  <link rel="stylesheet" href="/static/ui.css?v=20260509-polish" />
</head>
<body class="page-home">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/static/home.html">微信助手</a>
      <nav class="nav" aria-label="导航">
        <a href="/static/home.html" aria-current="page">首页</a>
        <a href="/static/score.html?v=20260509-idcard">成绩查询</a>
        <a href="/static/chat.html">智能问答</a>
      </nav>
    </div>
  </div>
  <div class="study-decor" aria-hidden="true">
    <span class="book book-open"></span>
    <span class="book book-three"></span>
    <span class="book book-two"></span>
    <span class="book book-one"></span>
  </div>
  <main class="stage">
    <div class="card">
      <header>
        <h1>微信问答助手</h1>
        <p class="subtitle">把常用的成绩查询和知识问答放在一个安静、清晰的入口里。</p>
      </header>

      <div class="grid">
        <a class="tile" href="/static/score.html?v=20260509-idcard">
          <div class="tile-title">
            <h2>成绩查询</h2>
          </div>
          <p class="desc">输入姓名、学号与身份证后6位，查询个人课程成绩。</p>
          <span class="btn">进入</span>
        </a>

        <a class="tile" href="/static/chat.html">
          <div class="tile-title">
            <h2>问答系统</h2>
          </div>
          <p class="desc">输入问题并回车发送，获取智能回答。</p>
          <span class="btn alt">进入</span>
        </a>
      </div>
    </div>
  </main>
</body>
</html>
