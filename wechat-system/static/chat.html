<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能问答</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --danger: #dc2626;
      --border: rgba(229, 231, 235, 0.9);
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 247, 251, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      text-decoration: none;
      color: rgba(17, 24, 39, 0.8);
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
    }

    .nav a:hover {
      background: rgba(37, 99, 235, 0.08);
      border-color: rgba(37, 99, 235, 0.18);
      color: rgba(17, 24, 39, 0.92);
    }

    .stage {
      position: relative;
      height: calc(100vh - 54px);
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 22px 16px;
    }

    .layout {
      width: 100%;
      max-width: 720px;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    body.empty .layout { justify-content: center; }

    .empty-greet {
      display: none;
      text-align: center;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.2px;
      color: rgba(17, 24, 39, 0.92);
      margin-bottom: 16px;
    }
    body.empty .empty-greet { display: block; }

    .empty-sub {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin: 0;
    }

    body.empty .empty-sub { display: block; }

    .chat {
      flex: 1;
      overflow: auto;
      padding: 2px 2px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    body.empty .chat { display: none; }

    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant, .msg.error { justify-content: flex-start; }

    .bubble {
      max-width: min(92%, 640px);
      padding: 10px 12px;
      border-radius: 16px;
      border: none;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 22px rgba(17, 24, 39, 0.06);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 14px;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(124, 58, 237, 0.14));
    }

    .msg.error .bubble {
      background: rgba(220, 38, 38, 0.06);
      color: var(--danger);
    }

    .composer-shell {
      position: relative;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      padding: 12px 12px 10px;
      display: grid;
      gap: 10px;
    }

    .composer {
      display: grid;
      gap: 10px;
    }

    textarea {
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      padding: 12px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
      transition: box-shadow 120ms ease;
    }
    textarea::placeholder { color: #9ca3af; }
    textarea:focus { box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
    textarea[aria-invalid="true"] { box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.10); }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .hint { font-size: 12px; color: var(--muted); }
    body.empty .hint { display: none; }
    button {
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
      white-space: nowrap;
    }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; filter: grayscale(25%) opacity(0.7); }

    .field-error {
      min-height: 16px;
      font-size: 12px;
      line-height: 1.2;
      color: var(--danger);
      visibility: hidden;
    }
    .field-error.show { visibility: visible; }
  </style>
  <link rel="stylesheet" href="/static/ui.css?v=20260509-polish" />
</head>
<body class="page-chat empty">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/static/home.html">微信助手</a>
      <nav class="nav" aria-label="导航">
        <a href="/static/home.html">首页</a>
        <a href="/static/score.html?v=20260628-idcard4">成绩查询</a>
        <a href="/static/chat.html" aria-current="page">智能问答</a>
      </nav>
    </div>
  </div>
  <div class="study-decor" aria-hidden="true">
    <span class="book book-open"></span>
    <span class="book book-three"></span>
    <span class="book book-two"></span>
    <span class="book book-one"></span>
  </div>
  <main class="stage">
    <div class="layout">
      <div id="chat" class="chat" aria-live="polite"></div>

      <div class="empty-greet">你好，请问你有什么问题</div>
      <p class="empty-sub">输入问题并回车发送；仅基于知识库回答，无法确定会提示你去问老师。</p>

      <div class="composer-shell">
        <form id="askForm" class="composer" autocomplete="off">
          <div>
            <label class="sr-only" for="question">问题</label>
            <textarea id="question" placeholder="请输入问题（回车发送，Shift+回车换行）" maxlength="2000"></textarea>
            <div id="questionError" class="field-error" role="alert">输入格式错误，请重新输入</div>
          </div>
          <div class="actions">
            <div class="hint">仅基于知识库回答；无法确定时会回复“暂无法回答，请直接询问老师”</div>
            <button id="sendBtn" type="submit">发送</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script>
    const chatEl = document.getElementById("chat");
    const formEl = document.getElementById("askForm");
    const questionEl = document.getElementById("question");
    const errorEl = document.getElementById("questionError");
    const sendBtn = document.getElementById("sendBtn");

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setFieldError(show) {
      errorEl.classList.toggle("show", !!show);
      questionEl.setAttribute("aria-invalid", show ? "true" : "false");
    }

    function appendMessage(role, text) {
      if (document.body.classList.contains("empty")) {
        document.body.classList.remove("empty");
      }
      const wrapper = document.createElement("div");
      wrapper.className = `msg ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = escapeHtml(text);
      wrapper.appendChild(bubble);
      chatEl.appendChild(wrapper);
      chatEl.scrollTop = chatEl.scrollHeight;
      return bubble;
    }

    function validateQuestion() {
      const q = questionEl.value.trim();
      if (!q) {
        setFieldError(true);
        return null;
      }
      setFieldError(false);
      return q;
    }

    async function ask(question) {
      sendBtn.disabled = true;
      const pendingBubble = appendMessage("assistant", "思考中…");
      try {
        const resp = await fetch("/api/qa/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          pendingBubble.parentElement.className = "msg error";
          pendingBubble.innerHTML = escapeHtml(data.detail || "暂无法回答，请直接询问老师");
          return;
        }
        if (!data.ok) {
          pendingBubble.parentElement.className = "msg error";
          pendingBubble.innerHTML = escapeHtml(data.message || "暂无法回答，请直接询问老师");
          return;
        }
        pendingBubble.parentElement.className = "msg assistant";
        pendingBubble.innerHTML = escapeHtml(data.answer || "暂无法回答，请直接询问老师");
      } catch (e) {
        pendingBubble.parentElement.className = "msg error";
        pendingBubble.innerHTML = escapeHtml("暂无法回答，请直接询问老师");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function sendCurrent() {
      const q = validateQuestion();
      if (!q) return;
      appendMessage("user", q);
      questionEl.value = "";
      ask(q);
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      sendCurrent();
    });

    questionEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendCurrent();
      }
    });

    questionEl.addEventListener("input", () => {
      if (questionEl.value.trim().length > 0) setFieldError(false);
    });
  </script>
</body>
</html>
