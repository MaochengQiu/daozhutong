<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能问答</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --danger: #dc2626;
      --shadow: 0 18px 42px rgba(17, 24, 39, 0.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    body.empty {
      background: linear-gradient(135deg, rgba(239, 246, 255, 1), rgba(245, 243, 255, 1));
    }

    .bg {
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(800px 520px at 18% 18%, rgba(59, 130, 246, 0.22), transparent 55%),
        radial-gradient(800px 520px at 82% 25%, rgba(124, 58, 237, 0.20), transparent 55%),
        radial-gradient(700px 520px at 60% 85%, rgba(29, 78, 216, 0.14), transparent 60%);
      filter: blur(18px);
      animation: drift 14s ease-in-out infinite alternate;
      pointer-events: none;
      transform: translateZ(0);
    }

    body.empty .bg { display: none; }

    @keyframes drift {
      0% { transform: translate3d(-2%, -1%, 0) scale(1.02); }
      50% { transform: translate3d(1%, 2%, 0) scale(1.06); }
      100% { transform: translate3d(2%, -2%, 0) scale(1.03); }
    }

    .stage {
      position: relative;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 22px 16px;
    }

    .layout {
      width: 100%;
      max-width: 720px;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    body.empty .layout { justify-content: center; }

    .empty-greet {
      display: none;
      text-align: center;
      font-size: 35px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: rgba(17, 24, 39, 0.92);
      margin-bottom: 35px;
    }
    body.empty .empty-greet { display: block; }

    .chat {
      flex: 1;
      overflow: auto;
      padding: 2px 2px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    body.empty .chat { display: none; }

    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant, .msg.error { justify-content: flex-start; }

    .bubble {
      max-width: min(92%, 640px);
      padding: 10px 12px;
      border-radius: 16px;
      border: none;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 10px 22px rgba(17, 24, 39, 0.06);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 14px;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(124, 58, 237, 0.14));
    }

    .msg.error .bubble {
      background: rgba(220, 38, 38, 0.06);
      color: var(--danger);
    }

    .composer-shell {
      position: relative;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      padding: 12px 12px 10px;
      display: grid;
      gap: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    body.empty .composer-shell::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      background: linear-gradient(120deg, rgba(59, 130, 246, 0.26), rgba(124, 58, 237, 0.22), rgba(29, 78, 216, 0.20));
      background-size: 200% 200%;
      filter: blur(8px);
      opacity: 0.70;
      animation: glow 4.2s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes glow {
      0% { background-position: 0% 50%; transform: translateZ(0) scale(1.00); }
      100% { background-position: 100% 50%; transform: translateZ(0) scale(1.02); }
    }

    .composer {
      display: grid;
      gap: 10px;
    }

    textarea {
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      padding: 12px 12px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      outline: none;
      background: rgba(249, 250, 251, 0.85);
      transition: box-shadow 120ms ease;
    }
    textarea::placeholder { color: #9ca3af; }
    textarea:focus { box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
    textarea[aria-invalid="true"] { box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.10); }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .hint { font-size: 12px; color: var(--muted); }
    body.empty .hint { display: none; }
    button {
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
      white-space: nowrap;
    }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; filter: grayscale(25%) opacity(0.7); }

    .field-error {
      min-height: 16px;
      font-size: 12px;
      line-height: 1.2;
      color: var(--danger);
      visibility: hidden;
    }
    .field-error.show { visibility: visible; }
  </style>
</head>
<body class="empty">
  <div class="bg" aria-hidden="true"></div>
  <div class="stage">
    <div class="layout">
      <div id="chat" class="chat" aria-live="polite"></div>

      <div class="empty-greet">你好，请问你有什么问题</div>

      <div class="composer-shell">
        <form id="askForm" class="composer" autocomplete="off">
          <div>
            <textarea id="question" placeholder="请输入问题（回车发送，Shift+回车换行）" maxlength="2000"></textarea>
            <div id="questionError" class="field-error" role="alert">输入格式错误，请重新输入</div>
          </div>
          <div class="actions">
            <div class="hint">仅基于知识库回答；无法确定时会回复“暂无法解答”</div>
            <button id="sendBtn" type="submit">发送</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    const chatEl = document.getElementById("chat");
    const formEl = document.getElementById("askForm");
    const questionEl = document.getElementById("question");
    const errorEl = document.getElementById("questionError");
    const sendBtn = document.getElementById("sendBtn");

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setFieldError(show) {
      errorEl.classList.toggle("show", !!show);
      questionEl.setAttribute("aria-invalid", show ? "true" : "false");
    }

    function appendMessage(role, text) {
      if (document.body.classList.contains("empty")) {
        document.body.classList.remove("empty");
      }
      const wrapper = document.createElement("div");
      wrapper.className = `msg ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = escapeHtml(text);
      wrapper.appendChild(bubble);
      chatEl.appendChild(wrapper);
      chatEl.scrollTop = chatEl.scrollHeight;
      return bubble;
    }

    function validateQuestion() {
      const q = questionEl.value.trim();
      if (!q) {
        setFieldError(true);
        return null;
      }
      setFieldError(false);
      return q;
    }

    async function ask(question) {
      sendBtn.disabled = true;
      const pendingBubble = appendMessage("assistant", "思考中…");
      try {
        const resp = await fetch("/api/qa/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          pendingBubble.parentElement.className = "msg error";
          pendingBubble.innerHTML = escapeHtml(data.detail || "请求失败，请稍后重试。");
          return;
        }
        if (!data.ok) {
          pendingBubble.parentElement.className = "msg error";
          pendingBubble.innerHTML = escapeHtml(data.message || "暂无法解答。");
          return;
        }
        pendingBubble.parentElement.className = "msg assistant";
        pendingBubble.innerHTML = escapeHtml(data.answer || "暂无法解答。");
      } catch (e) {
        pendingBubble.parentElement.className = "msg error";
        pendingBubble.innerHTML = escapeHtml("网络异常或服务不可用，请稍后重试。");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function sendCurrent() {
      const q = validateQuestion();
      if (!q) return;
      appendMessage("user", q);
      questionEl.value = "";
      ask(q);
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      sendCurrent();
    });

    questionEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendCurrent();
      }
    });

    questionEl.addEventListener("input", () => {
      if (questionEl.value.trim().length > 0) setFieldError(false);
    });
  </script>
</body>
</html>
