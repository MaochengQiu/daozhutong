<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成绩查询</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #020617;
      --muted: #64748b;
      --soft: #f1f5f9;
      --border: #e2e8f0;
      --primary: #0369a1;
      --primary2: #075985;
      --danger: #dc2626;
      --success: #047857;
      --shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(224, 242, 254, 0.55), rgba(248, 250, 252, 0) 280px),
        var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(248, 250, 252, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      font-weight: 800;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      text-decoration: none;
      color: rgba(17, 24, 39, 0.8);
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .nav a:hover,
    .nav a[aria-current="page"] {
      background: rgba(37, 99, 235, 0.08);
      border-color: rgba(37, 99, 235, 0.18);
      color: rgba(17, 24, 39, 0.92);
    }

    .brand:focus-visible,
    .nav a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(3, 105, 161, 0.28);
      outline-offset: 3px;
    }

    .page {
      min-height: calc(100vh - 54px);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .container { width: 100%; max-width: 680px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    header {
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    form { margin-top: 0; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .field { display: grid; gap: 8px; }
    label { font-size: 13px; font-weight: 700; color: #334155; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      transition: border-color 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
      background: #fff;
    }
    input::placeholder { color: #9ca3af; }
    input:focus {
      border-color: rgba(3, 105, 161, 0.65);
      box-shadow: 0 0 0 4px rgba(3, 105, 161, 0.12);
    }
    input[aria-invalid="true"] {
      border-color: rgba(220, 38, 38, 0.55);
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.10);
    }

    .actions { margin-top: 18px; display: grid; gap: 10px; }
    button {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: transform 180ms ease, background-color 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      box-shadow: 0 12px 22px rgba(3, 105, 161, 0.18);
    }
    button:hover { background: var(--primary2); }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; filter: grayscale(25%) opacity(0.72); box-shadow: none; }

    .hint { font-size: 12px; color: var(--muted); text-align: center; }
    .field-error {
      min-height: 16px;
      font-size: 12px;
      line-height: 1.2;
      color: var(--danger);
      visibility: hidden;
    }
    .field-error.show { visibility: visible; }
    #result { margin-top: 24px; display: grid; gap: 18px; }
    .result-overview {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      overflow: hidden;
      border: 1px solid rgba(3, 105, 161, 0.2);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(224, 242, 254, 0.76), rgba(255, 255, 255, 0.94) 52%),
        #fff;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }
    .result-overview::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), #c58b45);
    }
    .result-metric {
      min-width: 0;
      padding: 22px 24px 20px;
    }
    .result-metric + .result-metric {
      border-left: 1px solid rgba(3, 105, 161, 0.14);
    }
    .result-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.2;
    }
    .result-value {
      margin-top: 10px;
      color: #0f172a;
      font-size: clamp(30px, 7vw, 42px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }
    .result-unit {
      margin-left: 4px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--muted);
    }
    .subject-section {
      display: grid;
      gap: 10px;
    }
    .subject-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .subject-heading h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
      color: #0f172a;
    }
    .subject-count {
      flex: none;
      font-size: 12px;
      color: var(--muted);
    }
    .status {
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--soft);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .status.error {
      border-color: rgba(220, 38, 38, 0.35);
      background: rgba(220, 38, 38, 0.06);
      color: var(--danger);
    }
    .status.success {
      border-color: rgba(4, 120, 87, 0.26);
      background: rgba(4, 120, 87, 0.07);
      color: var(--success);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    thead th {
      text-align: left;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      padding: 10px 12px;
      background: var(--soft);
      border-bottom: 1px solid var(--border);
    }
    thead th:last-child,
    tbody td:last-child {
      width: 30%;
      text-align: right;
    }
    tbody td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover td { background: #f8fafc; }
    .course-name { font-weight: 600; color: #334155; }
    .score { font-variant-numeric: tabular-nums; font-weight: 800; color: #0f172a; }
    .footer { margin-top: 14px; text-align: center; font-size: 12px; color: var(--muted); }

    @media (min-width: 720px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .field.name-field {
        grid-column: span 2;
      }
    }

    @media (max-width: 520px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }
      .nav {
        width: 100%;
        justify-content: flex-start;
      }
      .page {
        min-height: auto;
        place-items: start center;
        padding: 20px 12px;
      }
      .card {
        padding: 20px 16px;
        border-radius: 14px;
      }
      .result-overview {
        grid-template-columns: 1fr;
      }
      .result-metric {
        padding: 18px 20px;
      }
      .result-metric + .result-metric {
        border-top: 1px solid rgba(3, 105, 161, 0.14);
        border-left: 0;
      }
      h1 { font-size: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
  <link rel="stylesheet" href="/static/ui.css?v=20260509-polish" />
</head>
<body class="page-score">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/static/home.html">微信助手</a>
      <nav class="nav" aria-label="导航">
        <a href="/static/home.html">首页</a>
        <a href="/static/score.html?v=20260628-idcard4" aria-current="page">成绩查询</a>
        <a href="/static/chat.html">智能问答</a>
      </nav>
    </div>
  </div>
  <div class="study-decor" aria-hidden="true">
    <span class="book book-open"></span>
    <span class="book book-three"></span>
    <span class="book book-two"></span>
    <span class="book book-one"></span>
  </div>

  <main class="page">
    <div class="container">
      <div class="card">
        <header>
          <h1>成绩查询</h1>
          <div class="subtitle">填写姓名、学号与身份证后4位，系统会核验身份后展示个人课程成绩。</div>
        </header>

        <form id="queryForm" autocomplete="off">
          <div class="grid">
            <div class="field name-field">
              <label for="name">姓名</label>
              <input id="name" maxlength="64" inputmode="text" placeholder="例如：张三" required />
              <div id="nameError" class="field-error" role="alert">输入格式错误，请重新输入</div>
            </div>
            <div class="field">
              <label for="studentId">学号</label>
              <input id="studentId" maxlength="11" inputmode="numeric" pattern="[0-9]{2,11}" placeholder="例如：2026001" required />
              <div id="studentIdError" class="field-error" role="alert">输入格式错误，请重新输入</div>
            </div>
            <div class="field">
              <label for="idCardSuffix">身份证后4位</label>
              <input id="idCardSuffix" maxlength="4" inputmode="text" pattern="[0-9Xx]{4}" placeholder="例如：8230" required />
              <div id="idCardSuffixError" class="field-error" role="alert">请输入身份证后4位</div>
            </div>
          </div>

          <div class="actions">
            <button id="queryBtn" type="submit">查询</button>
            <div class="hint">为保护服务稳定，频繁查询可能会被临时限制</div>
          </div>
        </form>

        <div id="result" aria-live="polite"></div>
        <div class="footer">如查询不到成绩，请核对姓名、学号与身份证后4位是否一致</div>
      </div>
    </div>
  </main>

  <script>
    const formEl = document.getElementById("queryForm");
    const btnEl = document.getElementById("queryBtn");
    const resultEl = document.getElementById("result");
    const nameEl = document.getElementById("name");
    const studentIdEl = document.getElementById("studentId");
    const idCardSuffixEl = document.getElementById("idCardSuffix");
    const nameErrorEl = document.getElementById("nameError");
    const studentIdErrorEl = document.getElementById("studentIdError");
    const idCardSuffixErrorEl = document.getElementById("idCardSuffixError");
    const NAME_RE = /^[\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff·]+$/;
    const STUDENT_ID_RE = /^\d{2,11}$/;
    const ID_CARD_SUFFIX_RE = /^[0-9X]{4}$/;
    let nameComposing = false;

    function setStatus(message, type) {
      if (!message) {
        resultEl.innerHTML = "";
        return;
      }
      const cls = type === "error" ? "status error" : "status";
      resultEl.innerHTML = `<div class="${cls}">${escapeHtml(message)}</div>`;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function displayValue(value) {
      if (value === null || value === undefined || value === "") return "-";
      return escapeHtml(value);
    }

    function displayMetric(value, unit) {
      if (value === null || value === undefined || value === "") return "-";
      return `${escapeHtml(value)}<span class="result-unit">${unit}</span>`;
    }

    function renderTable(records, summary) {
      const totalScore = summary?.total_score ?? summary?.weighted_average_score;
      const totalRank = summary?.total_rank;
      const rows = records
        .map((r) => `
          <tr>
            <td class="course-name">${displayValue(r.course)}</td>
            <td class="score">${displayValue(r.score)}</td>
          </tr>
        `)
        .join("");
      resultEl.innerHTML = `
        <div class="result-overview" aria-label="成绩汇总">
          <div class="result-metric">
            <div class="result-label">总成绩</div>
            <div class="result-value">${displayMetric(totalScore, "分")}</div>
          </div>
          <div class="result-metric">
            <div class="result-label">排名</div>
            <div class="result-value">${displayMetric(totalRank, "名")}</div>
          </div>
        </div>
        <div class="subject-section">
          <div class="subject-heading">
            <h2>各学科成绩</h2>
            <span class="subject-count">共 ${records.length} 门</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>学科名称</th><th>成绩</th></tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
        <div class="sr-only" role="status">查询成功，已展示总成绩、排名和各学科成绩。</div>
      `;
    }

    function setInvalid(el, invalid) {
      el.setAttribute("aria-invalid", invalid ? "true" : "false");
    }

    function setFieldError(errorEl, show) {
      errorEl.classList.toggle("show", !!show);
    }

    function sanitizeNameInput() {
      const raw = nameEl.value;
      const cleaned = raw.replace(/[^\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff·]/g, "");
      if (raw !== cleaned) nameEl.value = cleaned;
      const show = nameEl.value.length > 0 && !NAME_RE.test(nameEl.value);
      setInvalid(nameEl, show);
      setFieldError(nameErrorEl, show);
    }

    function sanitizeStudentIdInput() {
      const raw = studentIdEl.value;
      const cleaned = raw.replace(/\D/g, "").slice(0, 11);
      if (raw !== cleaned) studentIdEl.value = cleaned;
      const show = studentIdEl.value.length > 0 && !STUDENT_ID_RE.test(studentIdEl.value);
      setInvalid(studentIdEl, show);
      setFieldError(studentIdErrorEl, show);
    }

    function sanitizeIdCardSuffixInput() {
      const raw = idCardSuffixEl.value;
      const cleaned = raw.toUpperCase().replace(/[^0-9X]/g, "").slice(0, 4);
      if (raw !== cleaned) idCardSuffixEl.value = cleaned;
      const show = idCardSuffixEl.value.length > 0 && !ID_CARD_SUFFIX_RE.test(idCardSuffixEl.value);
      setInvalid(idCardSuffixEl, show);
      setFieldError(idCardSuffixErrorEl, show);
    }

    function normalizeName(raw) {
      return raw.trim();
    }

    function normalizeStudentId(raw) {
      return raw.trim();
    }

    function normalizeIdCardSuffix(raw) {
      return raw.trim().toUpperCase();
    }

    function validateInputs() {
      const name = normalizeName(nameEl.value);
      const studentId = normalizeStudentId(studentIdEl.value);
      const idCardSuffix = normalizeIdCardSuffix(idCardSuffixEl.value);
      setInvalid(nameEl, false);
      setInvalid(studentIdEl, false);
      setInvalid(idCardSuffixEl, false);
      setFieldError(nameErrorEl, false);
      setFieldError(studentIdErrorEl, false);
      setFieldError(idCardSuffixErrorEl, false);

      if (!name || !studentId || !idCardSuffix) {
        setStatus("请填写姓名、学号与身份证后4位后再查询。", "error");
        if (!name) {
          setInvalid(nameEl, true);
          setFieldError(nameErrorEl, true);
        }
        if (!studentId) {
          setInvalid(studentIdEl, true);
          setFieldError(studentIdErrorEl, true);
        }
        if (!idCardSuffix) {
          setInvalid(idCardSuffixEl, true);
          setFieldError(idCardSuffixErrorEl, true);
        }
        return null;
      }
      if (!NAME_RE.test(name)) {
        setInvalid(nameEl, true);
        setFieldError(nameErrorEl, true);
        setStatus("输入格式错误，请重新输入", "error");
        return null;
      }
      if (!STUDENT_ID_RE.test(studentId)) {
        setInvalid(studentIdEl, true);
        setFieldError(studentIdErrorEl, true);
        setStatus("输入格式错误，请重新输入", "error");
        return null;
      }
      if (!ID_CARD_SUFFIX_RE.test(idCardSuffix)) {
        setInvalid(idCardSuffixEl, true);
        setFieldError(idCardSuffixErrorEl, true);
        setStatus("身份证后4位必须为4位数字或X。", "error");
        return null;
      }
      return { name, studentId, idCardSuffix };
    }

    async function query() {
      const payload = validateInputs();
      if (!payload) {
        return;
      }
      const { name, studentId, idCardSuffix } = payload;

      btnEl.disabled = true;
      setStatus("查询中…");
      try {
        const resp = await fetch("/api/score/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ student_id: studentId, name, id_card_suffix: idCardSuffix }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          setStatus(data.detail || "请求失败，请稍后重试。", "error");
          return;
        }
        if (!data.ok) {
          setStatus(data.message || "输入信息有误，请重新输入", "error");
          return;
        }
        if (!Array.isArray(data.data) || data.data.length === 0) {
          setStatus("输入信息有误，请重新输入", "error");
          return;
        }
        renderTable(data.data, data.summary);
      } catch (e) {
        setStatus("网络异常或服务不可用，请稍后重试。", "error");
      } finally {
        btnEl.disabled = false;
      }
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      query();
    });

    nameEl.addEventListener("compositionstart", () => {
      nameComposing = true;
    });

    nameEl.addEventListener("compositionend", () => {
      nameComposing = false;
      sanitizeNameInput();
    });

    nameEl.addEventListener("input", (e) => {
      if (e.isComposing || nameComposing) return;
      sanitizeNameInput();
    });

    studentIdEl.addEventListener("input", () => {
      sanitizeStudentIdInput();
    });

    idCardSuffixEl.addEventListener("input", () => {
      sanitizeIdCardSuffixInput();
    });
  </script>
</body>
</html>
